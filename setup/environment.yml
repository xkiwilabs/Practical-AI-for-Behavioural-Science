# Conda Environment
# This file defines all the packages needed for the course.
#
# To create the environment:
#   conda env create -f environment.yml
#
# To activate it:
#   conda activate ai-behsci
#
# To update it (if packages are added later):
#   conda env update -f environment.yml --prune

name: ai-behsci
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pandas
  - numpy
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyter
  - notebook
  - ipykernel
