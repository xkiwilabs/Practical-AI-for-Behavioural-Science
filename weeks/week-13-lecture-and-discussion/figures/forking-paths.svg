<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="780" height="340" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>
  <text x="28" y="34" font-size="18" font-weight="700" fill="#2D2D2D">One Dataset, Many Paths</text>

  <!-- Root -->
  <rect x="24" y="138" width="168" height="60" rx="10" fill="#2D2D2D"/>
  <text x="108" y="164" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Your data</text>
  <text x="108" y="182" text-anchor="middle" font-size="11" fill="#D7D7D7">+ research question</text>

  <!-- Branch lines from root to each outcome -->
  <g stroke="#C8C8C8" stroke-width="2" fill="none">
    <path d="M 192,168 C 320,168 360,57 556,57"/>
    <path d="M 192,168 C 320,168 360,107 556,107"/>
    <path d="M 192,168 C 320,168 360,157 556,157"/>
    <path d="M 192,168 C 360,168 380,207 556,207"/>
    <path d="M 192,168 C 320,168 360,257 556,257"/>
    <path d="M 192,168 C 320,168 360,307 556,307"/>
  </g>

  <!-- Outcome pills: 5 null, 1 "significant" (the false positive) -->
  <g font-size="11" font-weight="600">
    <rect x="556" y="40" width="200" height="34" rx="17" fill="#EDEDED" stroke="#C8C8C8" stroke-width="1.5"/>
    <text x="656" y="61" text-anchor="middle" fill="#8C8C8C">drop outliers → n.s.</text>

    <rect x="556" y="90" width="200" height="34" rx="17" fill="#EDEDED" stroke="#C8C8C8" stroke-width="1.5"/>
    <text x="656" y="111" text-anchor="middle" fill="#8C8C8C">log-transform → n.s.</text>

    <rect x="556" y="140" width="200" height="34" rx="17" fill="#EDEDED" stroke="#C8C8C8" stroke-width="1.5"/>
    <text x="656" y="161" text-anchor="middle" fill="#8C8C8C">control for age → n.s.</text>

    <rect x="556" y="190" width="200" height="34" rx="17" fill="#A71930" stroke="#A71930" stroke-width="1.5"/>
    <text x="656" y="211" text-anchor="middle" fill="#fff">women only → p &lt; .05</text>

    <rect x="556" y="240" width="200" height="34" rx="17" fill="#EDEDED" stroke="#C8C8C8" stroke-width="1.5"/>
    <text x="656" y="261" text-anchor="middle" fill="#8C8C8C">median split → n.s.</text>

    <rect x="556" y="290" width="200" height="34" rx="17" fill="#EDEDED" stroke="#C8C8C8" stroke-width="1.5"/>
    <text x="656" y="311" text-anchor="middle" fill="#8C8C8C">exclude wave 1 → n.s.</text>
  </g>

  <!-- Callout on the false positive -->
  <text x="350" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#A71930">try enough paths…</text>
  <text x="350" y="222" text-anchor="middle" font-size="10.5" fill="#A71930">…and one looks “significant” by chance</text>
</svg>
