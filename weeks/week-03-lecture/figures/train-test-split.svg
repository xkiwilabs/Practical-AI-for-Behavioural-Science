<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D2D">Train / Test Split</text>

  <!-- Full dataset label -->
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#8C8C8C">Your full dataset (e.g., 3,000 participants)</text>

  <!-- Full data bar outline -->
  <rect x="60" y="72" width="680" height="50" rx="8" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Training portion (75%) -->
  <rect x="60" y="72" width="510" height="50" rx="8" fill="#4A90D9" opacity="0.18"/>
  <rect x="60" y="72" width="510" height="50" rx="8" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <text x="315" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#4A90D9">Training Set (~75%)</text>

  <!-- Test portion (25%) -->
  <rect x="570" y="72" width="170" height="50" rx="8" fill="#E8873D" opacity="0.18"/>
  <rect x="570" y="72" width="170" height="50" rx="8" fill="none" stroke="#E8873D" stroke-width="2"/>
  <text x="655" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#E8873D">Test Set (~25%)</text>

  <!-- Divider line -->
  <line x1="570" y1="68" x2="570" y2="126" stroke="#2D2D2D" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Labels below -->
  <text x="315" y="148" text-anchor="middle" font-size="12" fill="#4A90D9">Model learns from this data</text>
  <text x="655" y="148" text-anchor="middle" font-size="12" fill="#E8873D">Evaluate on this data</text>

  <!-- Don't peek callout -->
  <rect x="560" y="158" width="190" height="34" rx="6" fill="#A71930" opacity="0.08" stroke="#A71930" stroke-width="1.5"/>
  <text x="655" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#A71930">Don't peek until the end!</text>

  <!-- Arrow showing "never seen during training" -->
  <text x="315" y="200" text-anchor="middle" font-size="11" fill="#8C8C8C">The model never sees the test set during training — this keeps the evaluation honest</text>
</svg>
