<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="800" height="440" rx="12" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2D2D2D">5-Fold Cross-Validation with Held-Out Test Set</text>

  <!-- Step 1: Full data split into development + test -->
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#8C8C8C">Step 1: Split your data — set aside a final test set before doing anything else</text>

  <!-- Development data block -->
  <rect x="30" y="68" width="520" height="30" rx="6" fill="#4A90D9" opacity="0.12" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="290" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#4A90D9">Development Data (~75%)</text>

  <!-- Final test set block -->
  <rect x="560" y="68" width="210" height="30" rx="6" fill="#A71930" opacity="0.12" stroke="#A71930" stroke-width="2"/>
  <text x="665" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#A71930">Final Test Set (~25%)</text>

  <!-- Lock label -->
  <text x="665" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#A71930">Locked until the very end</text>

  <!-- Arrow down to CV -->
  <text x="290" y="130" text-anchor="middle" font-size="11" fill="#8C8C8C">↓ Step 2: Cross-validate on the development data only ↓</text>

  <!-- Column headers for CV grid -->
  <text x="110" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#8C8C8C">Chunk 1</text>
  <text x="210" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#8C8C8C">Chunk 2</text>
  <text x="310" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#8C8C8C">Chunk 3</text>
  <text x="410" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#8C8C8C">Chunk 4</text>
  <text x="510" y="156" text-anchor="middle" font-size="10" font-weight="600" fill="#8C8C8C">Chunk 5</text>

  <!-- Fold 1 -->
  <text x="30" y="182" font-size="11" font-weight="600" fill="#2D2D2D">Fold 1</text>
  <rect x="66" y="166" width="88" height="26" rx="4" fill="#E8873D" opacity="0.25" stroke="#E8873D" stroke-width="1.5"/>
  <text x="110" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#E8873D">Val</text>
  <rect x="166" y="166" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="210" y="184" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="266" y="166" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="310" y="184" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="366" y="166" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="410" y="184" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="466" y="166" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="510" y="184" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <text x="590" y="184" font-size="11" fill="#8C8C8C">→ R²₁</text>

  <!-- Fold 2 -->
  <text x="30" y="222" font-size="11" font-weight="600" fill="#2D2D2D">Fold 2</text>
  <rect x="66" y="206" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="110" y="224" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="166" y="206" width="88" height="26" rx="4" fill="#E8873D" opacity="0.25" stroke="#E8873D" stroke-width="1.5"/>
  <text x="210" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#E8873D">Val</text>
  <rect x="266" y="206" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="310" y="224" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="366" y="206" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="410" y="224" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="466" y="206" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="510" y="224" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <text x="590" y="224" font-size="11" fill="#8C8C8C">→ R²₂</text>

  <!-- Fold 3 -->
  <text x="30" y="262" font-size="11" font-weight="600" fill="#2D2D2D">Fold 3</text>
  <rect x="66" y="246" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="110" y="264" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="166" y="246" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="210" y="264" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="266" y="246" width="88" height="26" rx="4" fill="#E8873D" opacity="0.25" stroke="#E8873D" stroke-width="1.5"/>
  <text x="310" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#E8873D">Val</text>
  <rect x="366" y="246" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="410" y="264" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="466" y="246" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="510" y="264" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <text x="590" y="264" font-size="11" fill="#8C8C8C">→ R²₃</text>

  <!-- Fold 4 -->
  <text x="30" y="302" font-size="11" font-weight="600" fill="#2D2D2D">Fold 4</text>
  <rect x="66" y="286" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="110" y="304" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="166" y="286" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="210" y="304" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="266" y="286" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="310" y="304" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="366" y="286" width="88" height="26" rx="4" fill="#E8873D" opacity="0.25" stroke="#E8873D" stroke-width="1.5"/>
  <text x="410" y="304" text-anchor="middle" font-size="10" font-weight="600" fill="#E8873D">Val</text>
  <rect x="466" y="286" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="510" y="304" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <text x="590" y="304" font-size="11" fill="#8C8C8C">→ R²₄</text>

  <!-- Fold 5 -->
  <text x="30" y="342" font-size="11" font-weight="600" fill="#2D2D2D">Fold 5</text>
  <rect x="66" y="326" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="110" y="344" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="166" y="326" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="210" y="344" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="266" y="326" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="310" y="344" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="366" y="326" width="88" height="26" rx="4" fill="#4A90D9" opacity="0.15" stroke="#4A90D9" stroke-width="1"/>
  <text x="410" y="344" text-anchor="middle" font-size="10" fill="#4A90D9">Train</text>
  <rect x="466" y="326" width="88" height="26" rx="4" fill="#E8873D" opacity="0.25" stroke="#E8873D" stroke-width="1.5"/>
  <text x="510" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#E8873D">Val</text>
  <text x="590" y="344" font-size="11" fill="#8C8C8C">→ R²₅</text>

  <!-- Average score line -->
  <line x1="570" y1="362" x2="630" y2="362" stroke="#2D2D2D" stroke-width="1.5"/>
  <text x="600" y="382" text-anchor="middle" font-size="12" font-weight="700" fill="#5BA55B">Average R²</text>

  <!-- Final test set column on the right — always locked, spanning all folds -->
  <rect x="660" y="160" width="110" height="198" rx="8" fill="#A71930" opacity="0.06" stroke="#A71930" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="715" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#A71930">Final</text>
  <text x="715" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#A71930">Test Set</text>
  <text x="715" y="290" text-anchor="middle" font-size="10" fill="#A71930">Never touched</text>
  <text x="715" y="304" text-anchor="middle" font-size="10" fill="#A71930">during CV</text>

  <!-- Step 3 arrow -->
  <text x="715" y="380" text-anchor="middle" font-size="10" fill="#A71930">↑ Step 3: Evaluate</text>
  <text x="715" y="394" text-anchor="middle" font-size="10" fill="#A71930">best model here</text>

  <!-- Footer -->
  <text x="330" y="425" text-anchor="middle" font-size="11" fill="#8C8C8C">CV on development data picks the best model — the final test set gives an honest performance estimate</text>
</svg>
